name: Sync Content Assets to R2

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "scripts/sync-blog-images-to-r2.ts"
      - "scripts/*.test.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/sync-blog-images-r2.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-images:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run script regression tests
        run: pnpm run scripts:test

      - name: Sync content assets to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_CONTENT_BUCKET_NAME: ${{ vars.R2_CONTENT_BUCKET_NAME != '' && vars.R2_CONTENT_BUCKET_NAME || secrets.R2_CONTENT_BUCKET_NAME }}
          R2_CONTENT_PUBLIC_HOST: ${{ vars.R2_CONTENT_PUBLIC_HOST != '' && vars.R2_CONTENT_PUBLIC_HOST || secrets.R2_CONTENT_PUBLIC_HOST }}
          R2_BLOG_BUCKET_NAME: ${{ vars.R2_BLOG_BUCKET_NAME != '' && vars.R2_BLOG_BUCKET_NAME || secrets.R2_BLOG_BUCKET_NAME }}
          R2_BLOG_PUBLIC_HOST: ${{ vars.R2_BLOG_PUBLIC_HOST != '' && vars.R2_BLOG_PUBLIC_HOST || secrets.R2_BLOG_PUBLIC_HOST }}
        run: pnpm run content:assets:sync:r2

      - name: Open pull request for rewritten content assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$(git status --porcelain content)" ]; then
            branch="automation/sync-content-assets-${GITHUB_RUN_ID}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git switch -c "$branch"
            git add content
            git commit -m "chore(content): sync assets to R2 [skip ci]"
            git push --set-upstream origin "$branch"
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(content): sync assets to R2" \
              --body "Automated content asset R2 sync from workflow run ${GITHUB_RUN_ID}."
          else
            echo "No content asset sync changes detected."
          fi
