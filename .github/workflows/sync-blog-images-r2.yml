name: Sync Blog Images to R2

on:
  push:
    branches:
      - main
    paths:
      - "content/blog/**"
      - "scripts/sync-blog-images-to-r2.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/sync-blog-images-r2.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-images:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Sync blog images to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BLOG_BUCKET_NAME: ${{ vars.R2_BLOG_BUCKET_NAME != '' && vars.R2_BLOG_BUCKET_NAME || secrets.R2_BLOG_BUCKET_NAME }}
          R2_BLOG_PUBLIC_HOST: ${{ vars.R2_BLOG_PUBLIC_HOST != '' && vars.R2_BLOG_PUBLIC_HOST || secrets.R2_BLOG_PUBLIC_HOST }}
        run: pnpm run images:sync:r2

      - name: Commit rewritten blog content
        run: |
          if [ -n "$(git status --porcelain content/blog)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add content/blog
            git commit -m "chore(images): sync blog images to R2 [skip ci]"
            git push
          else
            echo "No blog image sync changes detected."
          fi
